<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illy Hassan - Email Signature</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif;">
    <!-- Signoff GIF -->
    <div style="text-align: left; margin-bottom: 15px;">
        <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/shared/images/signoff.gif"
             alt="Thank You"
             style="height: 57px; border: 0; display: block;"
             border="0">
    </div>

    <!-- Main Signature Table -->
    <table style="border-collapse: collapse; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif;">
        <tr>
            <!-- Left Column: Headshot + Logo -->
            <td style="vertical-align: top; padding-right: 20px; border-right: 2px solid #14503C;">
                <!-- Headshot -->
                <div style="text-align: center; margin-bottom: 10px;">
                    <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/clients/illy-hassan/images/illy-hassan-headshot.jpg"
                         alt="Illy Hassan"
                         style="width: 80px; height: 80px; border-radius: 50%; border: 0; display: block; margin: 0 auto;"
                         border="0">
                </div>

                <!-- Substantia Realty Logo -->
                <div style="text-align: center;">
                    <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/clients/illy-hassan/images/substantia-realty-logo.png"
                         alt="Substantia Realty"
                         style="width: 110px; height: auto; border: 0; display: block; margin: 0 auto;"
                         border="0">
                </div>
            </td>

            <!-- Right Column: Contact Information -->
            <td style="vertical-align: top; padding-left: 20px;">
                <!-- Name -->
                <div style="color: #14503C; font-size: 16px; font-weight: bold; margin-bottom: 2px; font-family: Arial, Helvetica, sans-serif;">
                    Illy Hassan
                </div>

                <!-- Title + Company -->
                <div style="color: #14503C; font-size: 13px; font-weight: bold; margin-bottom: 8px; font-family: Arial, Helvetica, sans-serif;">
                    REALTOR&reg; | Luxury Specialist | Substantia Realty
                </div>

                <!-- Phone + Website Row -->
                <div style="color: #646464; font-size: 11px; margin-bottom: 3px; font-family: Arial, Helvetica, sans-serif;">
                    <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/clients/illy-hassan/images/icon-phone.png"
                         alt="Phone"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    (346) 730-0235
                    &nbsp;&nbsp;&nbsp;
                    <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/clients/illy-hassan/images/icon-web.png"
                         alt="Website"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    <a href="https://illyhassan.com"
                       style="color: #646464; text-decoration: none;"
                       target="_blank"
                       rel="nofollow noreferrer">illyhassan.com</a>
                </div>

                <!-- Email Row -->
                <div style="color: #646464; font-size: 11px; margin-bottom: 3px; font-family: Arial, Helvetica, sans-serif;">
                    <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/clients/illy-hassan/images/icon-email.png"
                         alt="Email"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    <a href="mailto:illy@substantiarealty.com"
                       style="color: #646464; text-decoration: none;"
                       target="_blank"
                       rel="nofollow noreferrer">illy@substantiarealty.com</a>
                </div>

                <!-- Address Row -->
                <div style="color: #646464; font-size: 11px; font-family: Arial, Helvetica, sans-serif;">
                    <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/clients/illy-hassan/images/icon-address.png"
                         alt="Address"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    Houston, TX
                </div>
            </td>
        </tr>
    </table>

    <!-- Social Media Icons -->
    <div style="margin-top: 15px;">
        <a href="https://www.instagram.com/illytherealtor/"
           target="_blank"
           rel="nofollow noreferrer"
           style="text-decoration: none;">
            <img src="https://raw.githubusercontent.com/Agent-Marketing-Desk/email-signature/main/clients/illy-hassan/images/icon-instagram.png"
                 alt="Instagram"
                 style="width: 24px; height: 24px; border-radius: 50%; border: 0;"
                 width="24"
                 height="24"
                 border="0">
        </a>
    </div>
</body>
</html>
